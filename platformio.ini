[env:m5stack-cores3]
platform = espressif32
board = m5stack-cores3
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
; upload_port / monitor_port は未指定 = PlatformIO の自動検出に任せる。
; m5stack-cores3 ボード定義の HWID (VID 0x303A / PID 0x1001 = ESP32-S3 USB JTAG/serial)
; に一致するポートが優先される。CoreS3 を USB 接続すれば自動でそのポートが選ばれる。
board_build.partitions = default_8MB.csv
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=0
lib_deps =
    m5stack/M5Unified@^0.2.0
    adafruit/Adafruit NeoPixel@^1.12.0
